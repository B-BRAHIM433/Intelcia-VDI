        "Message.$": "States.Format('========================================\nRAPPORT VDI IMAGE FACTORY\n========================================\nDate:      {}\nExecution: {}\nClients:   {}\n========================================\n\n{}\n\n========================================\nACTIONS:\n  SUCCESS -> Bundle READY_FOR_DEPLOYMENT\n  FAILED  -> Verifier DynamoDB (LastWSIError)\nhttps://eu-central-1.console.aws.amazon.com/states/home#/executions/details/{}\n========================================', $.ExecDate, $.ExecName, $.NbClients, States.JsonToString($.BuildResults), $.ExecId)"
