    "FormatEmailReport": {
      "Comment": "Lambda formats all client results into clean readable email for any number of clients",
      "Type": "Task",
      "Resource": "arn:aws:states:::lambda:invoke",
      "Parameters": {
        "FunctionName": "arn:aws:lambda:eu-central-1:274196731166:function:Format_Email_Report",
